<!DOCTYPE html>
<html>
<head><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#0A0A0B;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;color:#F5F5F7;text-align:center;position:relative;overflow:hidden}
.bg{position:absolute;width:500px;height:500px;border-radius:50%;filter:blur(120px);opacity:0.15}
.bg-1{background:#C9A84C;top:-100px;left:-50px}
.bg-2{background:#4D8EFF;bottom:-100px;right:-50px}
.mark{width:56px;height:56px;background:#C9A84C;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#0A0A0B;margin-bottom:28px;position:relative}
h1{font-size:52px;font-weight:700;letter-spacing:-0.03em;position:relative;line-height:1.1}
p{font-size:22px;color:#8E8E93;margin-top:16px;position:relative}
.url{position:absolute;bottom:32px;font-size:14px;color:#48484A;letter-spacing:0.05em}
</style></head>
<body>
<div class="bg bg-1"></div>
<div class="bg bg-2"></div>
<div class="mark">Z</div>
<h1>Software that protects<br>the future.</h1>
<p>Security. Verification. Compliance. Observability.</p>
<span class="url">zaphenath.app</span>
</body>
</html>
