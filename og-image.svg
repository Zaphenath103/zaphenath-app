<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111118;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orb -->
  <ellipse cx="300" cy="315" rx="350" ry="350" fill="#6366f1" opacity="0.06" filter="url(#blur)"/>
  <ellipse cx="1000" cy="200" rx="200" ry="200" fill="#818cf8" opacity="0.04" filter="url(#blur)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>

  <!-- Left accent bar -->
  <rect x="80" y="200" width="4" height="80" rx="2" fill="url(#accent)"/>

  <!-- Logo / Brand -->
  <text x="96" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#6366f1" letter-spacing="3">ZAPHENATH</text>

  <!-- Main headline -->
  <text x="96" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#f0f0f5" letter-spacing="-2">Software That</text>
  <text x="96" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="url(#accent)" letter-spacing="-2">Protects the Future.</text>

  <!-- Descriptor -->
  <text x="96" y="406" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#64748b">AI-powered security, verification, compliance, and observability.</text>

  <!-- Stats row -->
  <rect x="96" y="450" width="180" height="64" rx="12" fill="#111120" stroke="#1e1e2e" stroke-width="1"/>
  <text x="186" y="476" font-family="system-ui, monospace" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="1">REPOS SCANNED</text>
  <text x="186" y="502" font-family="system-ui, monospace" font-size="22" font-weight="900" fill="#6366f1" text-anchor="middle" letter-spacing="-1">200K+</text>

  <rect x="292" y="450" width="180" height="64" rx="12" fill="#111120" stroke="#1e1e2e" stroke-width="1"/>
  <text x="382" y="476" font-family="system-ui, monospace" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="1">F-GRADE RATE</text>
  <text x="382" y="502" font-family="system-ui, monospace" font-size="22" font-weight="900" fill="#ef4444" text-anchor="middle" letter-spacing="-1">58%</text>

  <rect x="488" y="450" width="180" height="64" rx="12" fill="#111120" stroke="#1e1e2e" stroke-width="1"/>
  <text x="578" y="476" font-family="system-ui, monospace" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="1">SCAN TIME</text>
  <text x="578" y="502" font-family="system-ui, monospace" font-size="22" font-weight="900" fill="#22d3a0" text-anchor="middle" letter-spacing="-1">60s</text>

  <!-- Right decoration: score display -->
  <rect x="850" y="160" width="270" height="310" rx="20" fill="#111120" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="866" y="176" width="238" height="1" fill="#1e1e2e"/>
  <circle cx="880" cy="184" r="5" fill="#ef4444"/>
  <circle cx="896" cy="184" r="5" fill="#f59e0b"/>
  <circle cx="912" cy="184" r="5" fill="#22d3a0"/>
  <text x="985" y="189" font-family="system-ui, monospace" font-size="11" fill="#4a4a6a" text-anchor="middle">ZaphScore</text>
  <text x="985" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="#f59e0b" text-anchor="middle" letter-spacing="-4">74</text>
  <text x="985" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Grade C — Needs attention</text>

  <!-- Dimension bars -->
  <text x="875" y="365" font-family="system-ui, monospace" font-size="11" fill="#4a4a6a">secrets</text>
  <rect x="875" y="370" width="220" height="4" rx="2" fill="#1e1e2e"/>
  <rect x="875" y="370" width="198" height="4" rx="2" fill="#22d3a0"/>

  <text x="875" y="390" font-family="system-ui, monospace" font-size="11" fill="#4a4a6a">dependencies</text>
  <rect x="875" y="395" width="220" height="4" rx="2" fill="#1e1e2e"/>
  <rect x="875" y="395" width="154" height="4" rx="2" fill="#f59e0b"/>

  <text x="875" y="415" font-family="system-ui, monospace" font-size="11" fill="#4a4a6a">agent patterns</text>
  <rect x="875" y="420" width="220" height="4" rx="2" fill="#1e1e2e"/>
  <rect x="875" y="420" width="132" height="4" rx="2" fill="#ef4444"/>

  <text x="875" y="440" font-family="system-ui, monospace" font-size="11" fill="#4a4a6a">iac / sast</text>
  <rect x="875" y="445" width="220" height="4" rx="2" fill="#1e1e2e"/>
  <rect x="875" y="445" width="176" height="4" rx="2" fill="#6366f1"/>

  <!-- Domain watermark -->
  <text x="1120" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#2a2a4a" text-anchor="end">zaphenath.app</text>
</svg>
